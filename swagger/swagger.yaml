openapi: 3.0.0
info:
  title: ShopEase API
  version: 1.0.0
  description: REST API for managing shop products.

paths:
  /api/products:
    get:
      summary: Get all products
      responses:
        200:
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        200:
          description: Created product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /api/products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    put:
      summary: Update a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        200:
          description: Updated product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    delete:
      summary: Delete a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Product deleted
          content:
            text/plain:
              schema:
                type: string
                example: Product deleted

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Wireless Mouse
        price:
          type: number
          format: float
          example: 29.99
        stock:
          type: integer
          example: 50
      required:
        - id
        - name
        - price
        - stock

    ProductInput:
      type: object
      properties:
        name:
          type: string
          example: Wireless Mouse
        price:
          type: number
          format: float
          example: 29.99
        stock:
          type: integer
          example: 50
      required:
        - name
        - price
        - stock
